name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npx biome check src/ tests/

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run
